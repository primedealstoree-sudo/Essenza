<!DOCTYPE html>

<head>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #ffffff;
      color: #111;
    }

    header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 3px;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .produto {
      border: 1px solid #eee;
      padding: 15px;
      margin: 15px;
      width: 250px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }

    .produto img {
      width: 100%;
      height: 200px;
      object-fit: cover; /* resolve imagens desiguais */
      border-radius: 5px;
      margin-bottom: 5px;
    }

    button {
      background: linear-gradient(45deg, #000, #333);
      color: white;
      padding: 12px;
      border: none;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
      width: 100%;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: black;
    }
  </style>
</head>
